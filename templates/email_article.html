<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ article.title }}</title>
	<style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            margin: 0;
            padding: 0;
        }

        .email-container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .email-header {
            background-color: #343a40;
            color: #ffffff;
            padding: 15px;
            text-align: center;
        }

        .email-header h1 {
            margin: 0;
            font-size: 20px;
        }

        .email-body {
            padding: 20px;
        }

        .email-body h2 {
            color: #343a40;
            margin-top: 0;
        }

        .email-body p {
            line-height: 1.6;
            margin: 10px 0;
        }

        .email-body img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 20px;
        }

        .email-footer {
            background-color: #f8f9fa;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: #6c757d;
        }

        .email-footer a {
            color: #007bff;
            text-decoration: none;
        }

        .email-footer a:hover {
            text-decoration: underline;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #007bff;
            color: #ffffff;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .button:hover {
            background-color: #0056b3;
        }
	</style>
</head>
<body>
<div class="email-container">
	<div class="email-header">
		<h1>Nouvel article publié</h1>
	</div>
	<div class="email-body">
		<h2>{{ article.title }}</h2>
		<p>{{ article.content|safe }}</p>

		{% if image_url %}
			<img src="{{ image_url }}" alt="{{ article.title }}"
			     style="max-width: 100%; border-radius: 8px; margin-top: 20px;">
		{% else %}
			<p>Aucune image disponible pour cet article.</p>
		{% endif %}

		<a href="{{ article_link }}">Voir l'article</a>
	</div>
	<div class="email-footer">
		<p>Vous recevez cet email, car vous êtes abonné a la newsletter de BDS.</p>
	</div>
</div>
</body>
</html>
